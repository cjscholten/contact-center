<!doctype html>
<html lang="nl">
<head>
<meta charset="utf-8">
<title>Contact center POC-agent</title>
<style>
  body { font-family: system-ui, sans-serif; max-width: 480px; margin: 3rem auto; padding: 0 1rem; }
  .card { border: 1px solid #ccc; border-radius: 8px; padding: 1rem; margin-bottom: 1rem; }
  label { display: block; margin-bottom: .5rem; }
  input { width: 100%; padding: .4rem; box-sizing: border-box; }
  button { padding: .5rem 1.2rem; margin-right: .5rem; }
  #status, #agentStatus { font-weight: bold; }
  #wrapupFinish { background: #2d7a2d; color: white; border: none; border-radius: 4px; }
</style>
</head>
<body>
<h1>POC-agent</h1>

<div class="card">
  <label>Asterisk-host <input id="host" value="localhost"></label>
  <label>Gebruiker <input id="user" value="agent1001"></label>
  <label>Wachtwoord <input id="pass" type="password" value="changeme-dev"></label>
  <button id="connect">Aanmelden</button>
  <button id="disconnect" disabled>Afmelden</button>
</div>

<div class="card">
  <div>Agent-status: <span id="agentStatus">afgemeld</span></div>
  <p><button id="wrapupFinish" hidden>Klaar — beschikbaar</button></p>
  <div>Gesprek: <span id="status">—</span></div>
  <p>
    <button id="answer" disabled>Aannemen</button>
    <button id="hold" hidden>In de wacht</button>
    <button id="hangup" disabled>Ophangen</button>
  </p>
  <p id="transferRow" hidden>
    <input id="transferTarget" placeholder="wachtrij of nummer" style="width:auto">
    <button id="transferCold">Koud doorverbinden</button>
  </p>
</div>

<audio id="remoteAudio" autoplay></audio>

<script type="module">
import { Web } from 'https://cdn.jsdelivr.net/npm/sip.js@0.21.2/+esm';

const API = 'http://localhost:5080';
const STATUS_NL = { LoggedOut: 'afgemeld', Available: 'beschikbaar', OnCall: 'in gesprek', WrapUp: 'nawerktijd' };

const $ = id => document.getElementById(id);
const setStatus = t => { $('status').textContent = t; };
let simpleUser;
let agentName = null;

// Synthetische beltoon (WebAudio) — geen extern audiobestand nodig.
// AudioContext mag pas na een user-gesture; "Aanmelden" telt als zodanig.
let audioCtx;
let ringTimer = null;
function ensureAudio() {
  audioCtx ??= new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
}
function ringBurst() {
  const now = audioCtx.currentTime;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = 'sine';
  osc.frequency.value = 425; // NL-beltoonfrequentie
  gain.gain.setValueAtTime(0, now);
  gain.gain.linearRampToValueAtTime(0.2, now + 0.05);
  gain.gain.setValueAtTime(0.2, now + 0.95);
  gain.gain.linearRampToValueAtTime(0, now + 1.0);
  osc.connect(gain).connect(audioCtx.destination);
  osc.start(now);
  osc.stop(now + 1.0);
}
function startRinging() {
  ensureAudio();
  ringBurst();
  ringTimer = setInterval(ringBurst, 3000); // 1s toon, 2s stilte
}
function stopRinging() {
  if (ringTimer) { clearInterval(ringTimer); ringTimer = null; }
}

const presetHost = new URLSearchParams(location.search).get('host') ?? localStorage.getItem('cc-host');
if (presetHost) $('host').value = presetHost;

async function api(path, method = 'POST') {
  const response = await fetch(`${API}/api/agents/${agentName}/${path}`, { method });
  if (!response.ok) throw new Error(`${path}: HTTP ${response.status}`);
  return response.json();
}

setInterval(async () => {
  if (!agentName) return;
  try {
    const response = await fetch(`${API}/api/agents/${agentName}`);
    if (!response.ok) return;
    const snapshot = await response.json();
    $('agentStatus').textContent = STATUS_NL[snapshot.status] ?? snapshot.status;
    $('wrapupFinish').hidden = snapshot.status !== 'WrapUp';
  } catch { /* backend even weg; volgende poll opnieuw */ }
}, 2000);

$('connect').onclick = async () => {
  const host = $('host').value.trim();
  const user = $('user').value.trim();
  const pass = $('pass').value;

  simpleUser = new Web.SimpleUser(`ws://${host}:8088/ws`, {
    aor: `sip:${user}@${host}`,
    userAgentOptions: {
      authorizationUsername: user,
      authorizationPassword: pass
    },
    media: { remote: { audio: $('remoteAudio') } }
  });

  simpleUser.delegate = {
    onCallReceived: () => {
      setStatus('inkomend gesprek…');
      $('answer').disabled = false;
      startRinging();
    },
    onCallAnswered: () => {
      setStatus('in gesprek');
      stopRinging();
      $('answer').disabled = true;
      $('hangup').disabled = false;
      showHold(false);
      $('transferRow').hidden = false;
    },
    onCallHangup: () => {
      setStatus('—');
      stopRinging();
      $('answer').disabled = true;
      $('hangup').disabled = true;
      $('hold').hidden = true;
      $('transferRow').hidden = true;
    },
    onServerDisconnect: () => setStatus('verbinding verbroken')
  };

  try {
    setStatus('verbinden…');
    await simpleUser.connect();
    await simpleUser.register();
    agentName = user;
    await api('login');
    localStorage.setItem('cc-host', host);
    setStatus('—');
    $('connect').disabled = true;
    $('disconnect').disabled = false;
  } catch (e) {
    agentName = null;
    setStatus('fout: ' + e.message);
  }
};

$('disconnect').onclick = async () => {
  try { await api('logout'); } catch { /* backend weg; SIP toch afsluiten */ }
  try { await simpleUser.unregister(); await simpleUser.disconnect(); } catch { }
  stopRinging();
  agentName = null;
  $('agentStatus').textContent = 'afgemeld';
  $('wrapupFinish').hidden = true;
  $('connect').disabled = false;
  $('disconnect').disabled = true;
  setStatus('—');
};

$('wrapupFinish').onclick = async () => {
  try { await api('wrapup/finish'); } catch (e) { setStatus('fout: ' + e.message); }
};

let onHold = false;
function showHold(held) {
  onHold = held;
  $('hold').hidden = false;
  $('hold').textContent = held ? 'Uit de wacht' : 'In de wacht';
}
$('hold').onclick = async () => {
  try {
    await api(onHold ? 'unhold' : 'hold');
    showHold(!onHold);
    setStatus(onHold ? 'in de wacht' : 'in gesprek');
  } catch (e) {
    setStatus('fout: ' + e.message);
  }
};

$('transferCold').onclick = async () => {
  const target = $('transferTarget').value.trim();
  if (!target) return;
  try {
    const r = await fetch(`${API}/api/agents/${agentName}/transfer/cold`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ target })
    });
    if (!r.ok) throw new Error('HTTP ' + r.status);
    // de backend hangt de agent-leg op → onCallHangup reset de UI
  } catch (e) {
    setStatus('fout: ' + e.message);
  }
};

$('answer').onclick = () => simpleUser.answer();
$('hangup').onclick = () => simpleUser.hangup();
</script>
</body>
</html>
