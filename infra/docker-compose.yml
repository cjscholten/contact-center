# Draai dit op een Linux-host (VM naast de SBC, of WSL2 met
# networkingMode=mirrored). network_mode: host vermijdt alle
# NAT-problemen met SIP/RTP en werkt niet op Docker Desktop/Windows.
services:
  asterisk:
    build: ./asterisk
    container_name: cc-asterisk
    network_mode: host
    restart: unless-stopped
    volumes:
      # Gedeelde map met gegenereerde audio (TTS, eigen muziek); Asterisk speelt 'sound:custom/...'.
      - cc-sounds:/usr/share/asterisk/sounds/custom

  postgres:
    image: postgres:17
    container_name: cc-postgres
    network_mode: host
    restart: unless-stopped
    environment:
      POSTGRES_DB: contactcenter
      POSTGRES_USER: cc
      POSTGRES_PASSWORD: changeme-dev
    volumes:
      - pgdata:/var/lib/postgresql/data

  # Keycloak (OIDC) in dev-mode op poort 8080. Het realm 'contactcenter' wordt bij
  # elke start (her)geïmporteerd uit het gemounte JSON — die is de bron van waarheid.
  # Vereist een NSG-regel voor TCP 8080 (zie keycloak/README.md). Dev-only: http, geen TLS.
  keycloak:
    image: quay.io/keycloak/keycloak:26.1
    container_name: cc-keycloak
    command: start-dev --import-realm
    network_mode: host
    restart: unless-stopped
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: changeme-dev
      KC_HOSTNAME_STRICT: "false"
    volumes:
      - ./keycloak/contactcenter-realm.json:/opt/keycloak/data/import/contactcenter-realm.json:ro

  # Backend-API (.NET) op poort 5080, naast Asterisk/Postgres/Keycloak. Via network_mode
  # host zijn die op localhost bereikbaar. extra_hosts laat de publieke VM-naam naar loopback
  # wijzen: zo klopt de token-issuer (publiek IP, want de browser haalt het token daar) én
  # bereikt de backend Keycloak/ARI/DB lokaal (geen NAT-hairpin nodig). VmHost zet ARI/DB/
  # Keycloak op dat (publieke) adres. Vereist een NSG-regel voor TCP 5080 (front-ends → backend).
  backend:
    build:
      context: ..
      dockerfile: infra/backend/Dockerfile
    container_name: cc-backend
    network_mode: host
    restart: unless-stopped
    depends_on:
      - postgres
    extra_hosts:
      - "20.107.0.204:127.0.0.1"
    environment:
      VmHost: "20.107.0.204"
      Sounds__CustomDir: /var/lib/cc-sounds
    volumes:
      - cc-sounds:/var/lib/cc-sounds

volumes:
  pgdata:
  cc-sounds:
