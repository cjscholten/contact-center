# Draai dit op een Linux-host (VM naast de SBC, of WSL2 met
# networkingMode=mirrored). network_mode: host vermijdt alle
# NAT-problemen met SIP/RTP en werkt niet op Docker Desktop/Windows.
services:
  asterisk:
    build: ./asterisk
    container_name: cc-asterisk
    network_mode: host
    restart: unless-stopped
    environment:
      # entrypoint.sh vult hiermee de config-sjablonen (ari.conf/pjsip.conf) in. Uit infra/.env.
      ARI_PASSWORD: ${ARI_PASSWORD:?kopieer infra/.env.example naar infra/.env en vul de secrets in}
      # H-4: per-agent SIP-wachtwoorden (elk uniek) i.p.v. één gedeeld wachtwoord.
      AGENT1001_SIP_PASSWORD: ${AGENT1001_SIP_PASSWORD:?zet AGENT1001_SIP_PASSWORD in infra/.env (zie infra/.env.example)}
      AGENT1002_SIP_PASSWORD: ${AGENT1002_SIP_PASSWORD:?zet AGENT1002_SIP_PASSWORD in infra/.env (zie infra/.env.example)}
      # IP van het SBC-interface richting Asterisk (vervangt de oude handmatige sed in pjsip.conf).
      SBC_IP: ${SBC_IP:?zet SBC_IP in infra/.env (zie infra/.env.example)}
      # ICE-NAT-mapping voor WebRTC (rtp.conf): privé => publiek IP van de VM. Optioneel — leeg
      # laten bij een opstelling zonder NAT. Vervangt de oude handmatige rtp.conf-edit op de VM.
      RTP_PRIVATE_IP: ${RTP_PRIVATE_IP:-}
      RTP_PUBLIC_IP: ${RTP_PUBLIC_IP:-}
      # 5060-hardening (optioneel, defense-in-depth): comma-gescheiden CIDR-allowlist voor
      # inkomende SIP. Leeg = geen ACL. Zet aan zodra WS via de reverse proxy loopt, bv.
      # "127.0.0.1/8,172.16.0.0/24" (localhost voor de WS-agents + de VNet/SBC). Zie README.
      SIP_ACL_PERMIT: ${SIP_ACL_PERMIT:-}
    volumes:
      # Gedeelde map met gegenereerde audio (TTS, eigen muziek); Asterisk speelt 'sound:custom/...'.
      - cc-sounds:/usr/share/asterisk/sounds/custom

  # TURN/STUN-server voor WebRTC-agents achter NAT (thuiswerkers). Host-netwerk zodat de
  # relay-poorten direct bereikbaar zijn. Credentials zijn tijdelijk (use-auth-secret): de
  # backend geeft ze uit uit hetzelfde TURN_SECRET, dus geen vaste creds in de browser.
  coturn:
    image: coturn/coturn:4.6
    container_name: cc-coturn
    network_mode: host
    restart: unless-stopped
    # Let op: geen '-n'. De coturn-entrypoint doet `eval echo <arg>` per argument; `echo -n`
    # is de "geen-newline"-vlag en levert een leeg token op ("ERROR: Unknown argument:"). Er is
    # toch geen turnserver.conf, dus '-n' (config-bestand overslaan) is overbodig.
    command:
      - "--log-file=stdout"
      - "--no-cli"
      - "--no-multicast-peers"
      - "--listening-port=3478"
      - "--min-port=49160"
      - "--max-port=49200"
      - "--realm=${TURN_REALM:-contactcenter}"
      - "--use-auth-secret"
      - "--static-auth-secret=${TURN_SECRET:?zet TURN_SECRET in infra/.env (zie infra/.env.example)}"
      - "--external-ip=${TURN_EXTERNAL_IP:?zet TURN_EXTERNAL_IP in infra/.env (publiek[/privaat]-IP van de VM)}"
      - "--no-tls"
      - "--no-dtls"

  # Reverse proxy met automatische Let's Encrypt-TLS vóór backend/Keycloak/Asterisk-WS.
  # Termineert https/wss op 443; DNS-A-records api./auth./sip.<CC_DOMAIN> -> VM-IP en
  # NSG-poorten 80 + 443 zijn vereist voor de cert-uitgifte. Zie caddy/Caddyfile + README.
  caddy:
    image: caddy:2
    container_name: cc-caddy
    network_mode: host
    restart: unless-stopped
    environment:
      CC_DOMAIN: ${CC_DOMAIN:?zet CC_DOMAIN in infra/.env (bijv. zetadesk.net)}
      CADDY_ACME_EMAIL: ${CADDY_ACME_EMAIL:?zet CADDY_ACME_EMAIL in infra/.env (Let's Encrypt-notificaties)}
      # H-2: vertrouwde IP's voor de Keycloak-adminconsole (/admin* + /realms/master*). Spatie-
      # gescheiden CIDR's; default = alleen localhost (console publiek dicht tot je je IP invult).
      KC_ADMIN_ALLOW_CIDR: ${KC_ADMIN_ALLOW_CIDR:-127.0.0.1/8}
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

  postgres:
    image: postgres:17
    container_name: cc-postgres
    network_mode: host
    restart: unless-stopped
    environment:
      POSTGRES_DB: contactcenter
      POSTGRES_USER: cc
      # Secret uit infra/.env (zie infra/.env.example). Ontbreekt die, dan stopt compose met deze melding.
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?kopieer infra/.env.example naar infra/.env en vul de secrets in}
    volumes:
      - pgdata:/var/lib/postgresql/data

  # Idempotente init: maakt de losse Keycloak-rol + database aan in de bestaande Postgres en stopt.
  # Nodig omdat Keycloak in productie-modus een persistente DB vereist, en de Postgres-initdb-scripts
  # niet meer draaien op een bestaand datavolume. Draait vóór Keycloak (service_completed_successfully).
  keycloak-db-init:
    image: postgres:17
    container_name: cc-keycloak-db-init
    network_mode: host
    restart: "no"
    depends_on:
      - postgres
    environment:
      # cc is de superuser van deze Postgres-instance (POSTGRES_USER) en mag rollen/DB's aanmaken.
      PGPASSWORD: ${POSTGRES_PASSWORD:?kopieer infra/.env.example naar infra/.env en vul de secrets in}
      KEYCLOAK_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD:?zet KEYCLOAK_DB_PASSWORD in infra/.env (zie infra/.env.example)}
    entrypoint: ["sh", "-c"]
    command:
      - |
        set -e
        until pg_isready -h localhost -U cc -d contactcenter; do echo "wacht op postgres…"; sleep 1; done
        psql -h localhost -U cc -d postgres -tAc "SELECT 1 FROM pg_roles WHERE rolname='keycloak'" | grep -q 1 \
          || psql -h localhost -U cc -d postgres -c "CREATE ROLE keycloak LOGIN PASSWORD '$$KEYCLOAK_DB_PASSWORD'"
        psql -h localhost -U cc -d postgres -tAc "SELECT 1 FROM pg_database WHERE datname='keycloak'" | grep -q 1 \
          || psql -h localhost -U cc -d postgres -c "CREATE DATABASE keycloak OWNER keycloak"
        echo "keycloak-db-init klaar."

  # Keycloak (OIDC) in PRODUCTIE-modus op poort 8080, achter Caddy (TLS). Persistente Postgres-DB,
  # vaste hostname, brute-force-detectie (realm-JSON) en seed-wachtwoorden via envsubst uit infra/.env.
  # Realm-JSON's worden alleen bij de EERSTE start geïmporteerd (persistente DB — zie keycloak/README.md).
  # Poort 8080 hoort niet publiek te staan; de browser bereikt Keycloak via https://auth.<CC_DOMAIN> (Caddy).
  keycloak:
    build: ./keycloak
    image: cc-keycloak
    container_name: cc-keycloak
    command: ["start", "--optimized", "--import-realm"]
    network_mode: host
    restart: unless-stopped
    depends_on:
      keycloak-db-init:
        condition: service_completed_successfully
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:?kopieer infra/.env.example naar infra/.env en vul de secrets in}
      # Persistente database (i.p.v. de ephemeral H2 van dev-mode). Rol/DB gemaakt door keycloak-db-init.
      # KC_DB (vendor) is build-time en al in de image gebakken (Dockerfile: kc.sh build); hier alleen
      # de runtime-verbinding. Bij 'start --optimized' mag je de build-time optie niet opnieuw zetten.
      KC_DB_URL: jdbc:postgresql://localhost:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD:?zet KEYCLOAK_DB_PASSWORD in infra/.env (zie infra/.env.example)}
      # Vaste publieke hostname (productie-modus vereist dit); de browser krijgt https://auth.-URL's.
      KC_HOSTNAME: https://auth.${CC_DOMAIN:?zet CC_DOMAIN in infra/.env (bijv. zetadesk.net)}
      # Backend haalt de OIDC-metadata intern op localhost:8080 op; dynamische backchannel houdt die
      # interne calls op localhost terwijl de browser-issuer https://auth.- blijft (issuer-validatie op realm).
      KC_HOSTNAME_BACKCHANNEL_DYNAMIC: "true"
      # TLS wordt door Caddy getermineerd; Keycloak draait http achter de proxy en vertrouwt X-Forwarded-*.
      KC_HTTP_ENABLED: "true"
      KC_PROXY_HEADERS: xforwarded
      # Seed-wachtwoord voor de fixture-gebruikers; het entrypoint vult het via envsubst in de realm-JSON's.
      KEYCLOAK_SEED_PASSWORD: ${KEYCLOAK_SEED_PASSWORD:?zet KEYCLOAK_SEED_PASSWORD in infra/.env (zie infra/.env.example)}
    volumes:
      # Realm-templates (met ${KEYCLOAK_SEED_PASSWORD}-placeholder) worden door het entrypoint gerenderd
      # naar de import-map. Extra klant-realms voeg je toe met keycloak/provision-tenant.sh.
      - ./keycloak/contactcenter-realm.json:/opt/keycloak/data/import-templates/contactcenter-realm.json:ro
      - ./keycloak/tenant-acme-realm.json:/opt/keycloak/data/import-templates/tenant-acme-realm.json:ro

  # Backend-API (.NET) op poort 5080, naast Asterisk/Postgres/Keycloak. Via network_mode host
  # zijn die op localhost bereikbaar (de appsettings-defaults), dus géén VmHost hier — dat zou
  # ARI/DB/Keycloak naar het publieke IP sturen dat de VM zelf niet kan bereiken. Alleen de
  # token-issuer is het publieke IP (de browser haalt het token daar); de backend haalt de
  # Keycloak-metadata lokaal op. Vereist een NSG-regel voor TCP 5080 (front-ends → backend).
  backend:
    build:
      context: ..
      dockerfile: infra/backend/Dockerfile
    container_name: cc-backend
    network_mode: host
    restart: unless-stopped
    depends_on:
      - postgres
    environment:
      # Secrets uit infra/.env: de DB-connectionstring en het ARI-wachtwoord komen niet meer
      # uit appsettings.json (daar staan alleen secret-loze defaults). Env overschrijft die.
      ConnectionStrings__ContactCenter: "Host=localhost;Port=5432;Database=contactcenter;Username=cc;Password=${POSTGRES_PASSWORD}"
      Ari__Password: ${ARI_PASSWORD:?kopieer infra/.env.example naar infra/.env en vul de secrets in}
      # H-4: per-agent SIP-wachtwoorden. De statische agents (agent1001/1002) krijgen elk hun eigen
      # waarde — gelijk aan pjsip.conf — zodat de browser-registratie klopt. DefaultSipPassword is de
      # terugval voor overige/nieuw aangemaakte agents (nog geen eigen PJSIP-endpoint). Uit infra/.env.
      Agents__DefaultSipPassword: ${AGENT_SIP_PASSWORD}
      Agents__Agent1001SipPassword: ${AGENT1001_SIP_PASSWORD}
      Agents__Agent1002SipPassword: ${AGENT1002_SIP_PASSWORD}
      # TURN: hetzelfde geheim als coturn (tijdelijke creds) + de publieke coturn-host voor de browser.
      Turn__Secret: ${TURN_SECRET}
      Turn__Host: ${TURN_PUBLIC_HOST:?zet TURN_PUBLIC_HOST in infra/.env (publieke coturn-IP voor de browser)}
      # Multi-tenant: de backend haalt de JWKS per realm op bij deze basis-URL (lokaal, via
      # network_mode host). De token-issuer mag een ander (publiek) IP zijn — die wordt op
      # realm-lidmaatschap gevalideerd, niet op exacte host.
      Keycloak__BaseUrl: "http://localhost:8080"
      Sounds__CustomDir: /var/lib/cc-sounds
    volumes:
      - cc-sounds:/var/lib/cc-sounds

volumes:
  pgdata:
  cc-sounds:
  caddy_data:
  caddy_config:
