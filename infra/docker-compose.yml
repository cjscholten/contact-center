# Draai dit op een Linux-host (VM naast de SBC, of WSL2 met
# networkingMode=mirrored). network_mode: host vermijdt alle
# NAT-problemen met SIP/RTP en werkt niet op Docker Desktop/Windows.
services:
  asterisk:
    build: ./asterisk
    container_name: cc-asterisk
    network_mode: host
    restart: unless-stopped
    environment:
      # entrypoint.sh vult hiermee de config-sjablonen (ari.conf/pjsip.conf) in. Uit infra/.env.
      ARI_PASSWORD: ${ARI_PASSWORD:?kopieer infra/.env.example naar infra/.env en vul de secrets in}
      AGENT_SIP_PASSWORD: ${AGENT_SIP_PASSWORD:?kopieer infra/.env.example naar infra/.env en vul de secrets in}
      # IP van het SBC-interface richting Asterisk (vervangt de oude handmatige sed in pjsip.conf).
      SBC_IP: ${SBC_IP:?zet SBC_IP in infra/.env (zie infra/.env.example)}
    volumes:
      # Gedeelde map met gegenereerde audio (TTS, eigen muziek); Asterisk speelt 'sound:custom/...'.
      - cc-sounds:/usr/share/asterisk/sounds/custom

  postgres:
    image: postgres:17
    container_name: cc-postgres
    network_mode: host
    restart: unless-stopped
    environment:
      POSTGRES_DB: contactcenter
      POSTGRES_USER: cc
      # Secret uit infra/.env (zie infra/.env.example). Ontbreekt die, dan stopt compose met deze melding.
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?kopieer infra/.env.example naar infra/.env en vul de secrets in}
    volumes:
      - pgdata:/var/lib/postgresql/data

  # Keycloak (OIDC) in dev-mode op poort 8080. Het realm 'contactcenter' wordt bij
  # elke start (her)geïmporteerd uit het gemounte JSON — die is de bron van waarheid.
  # Vereist een NSG-regel voor TCP 8080 (zie keycloak/README.md). Dev-only: http, geen TLS.
  keycloak:
    image: quay.io/keycloak/keycloak:26.1
    container_name: cc-keycloak
    command: start-dev --import-realm
    network_mode: host
    restart: unless-stopped
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:?kopieer infra/.env.example naar infra/.env en vul de secrets in}
      KC_HOSTNAME_STRICT: "false"
    volumes:
      # Alle realm-JSON's in de import-map worden bij --import-realm geladen: de default-tenant
      # (contactcenter) en de voorbeeld-tenant (tenant-acme). Extra klant-realms voeg je toe met
      # keycloak/provision-tenant.sh (geen herstart nodig).
      - ./keycloak/contactcenter-realm.json:/opt/keycloak/data/import/contactcenter-realm.json:ro
      - ./keycloak/tenant-acme-realm.json:/opt/keycloak/data/import/tenant-acme-realm.json:ro

  # Backend-API (.NET) op poort 5080, naast Asterisk/Postgres/Keycloak. Via network_mode host
  # zijn die op localhost bereikbaar (de appsettings-defaults), dus géén VmHost hier — dat zou
  # ARI/DB/Keycloak naar het publieke IP sturen dat de VM zelf niet kan bereiken. Alleen de
  # token-issuer is het publieke IP (de browser haalt het token daar); de backend haalt de
  # Keycloak-metadata lokaal op. Vereist een NSG-regel voor TCP 5080 (front-ends → backend).
  backend:
    build:
      context: ..
      dockerfile: infra/backend/Dockerfile
    container_name: cc-backend
    network_mode: host
    restart: unless-stopped
    depends_on:
      - postgres
    environment:
      # Secrets uit infra/.env: de DB-connectionstring en het ARI-wachtwoord komen niet meer
      # uit appsettings.json (daar staan alleen secret-loze defaults). Env overschrijft die.
      ConnectionStrings__ContactCenter: "Host=localhost;Port=5432;Database=contactcenter;Username=cc;Password=${POSTGRES_PASSWORD}"
      Ari__Password: ${ARI_PASSWORD:?kopieer infra/.env.example naar infra/.env en vul de secrets in}
      # SIP-wachtwoord voor nieuw aangemaakte/geseede agents; moet gelijk zijn aan AGENT_SIP_PASSWORD
      # (pjsip.conf), zodat de browser-registratie klopt. Uit infra/.env.
      Agents__DefaultSipPassword: ${AGENT_SIP_PASSWORD}
      # Multi-tenant: de backend haalt de JWKS per realm op bij deze basis-URL (lokaal, via
      # network_mode host). De token-issuer mag een ander (publiek) IP zijn — die wordt op
      # realm-lidmaatschap gevalideerd, niet op exacte host.
      Keycloak__BaseUrl: "http://localhost:8080"
      Sounds__CustomDir: /var/lib/cc-sounds
    volumes:
      - cc-sounds:/var/lib/cc-sounds

volumes:
  pgdata:
  cc-sounds:
