; Dit is een SJABLOON: ${SBC_IP} en ${AGENT_SIP_PASSWORD} worden bij container-start ingevuld
; door entrypoint.sh (envsubst) uit infra/.env. Geen secrets/host-IP's in git.

; --- Transports -------------------------------------------------------------

[transport-udp]
type = transport
protocol = udp
bind = 0.0.0.0:5060

; WebSocket-transport voor browser-agents (via de ingebouwde HTTP-server, /ws)
[transport-ws]
type = transport
protocol = ws
bind = 0.0.0.0

; --- Trunk: AudioCodes SBC --------------------------------------------------
; SBC_IP = IP-adres van het SBC-interface richting Asterisk (env SBC_IP).
; De SBC moet inkomende trunk-gesprekken routeren naar <asterisk-host>:5060/udp.

[sbc]
type = endpoint
transport = transport-udp
context = from-trunk
disallow = all
allow = alaw,ulaw
direct_media = no
rtp_symmetric = yes
force_rport = yes
rewrite_contact = yes
aors = sbc

[sbc]
type = aor
contact = sip:${SBC_IP}:5060
qualify_frequency = 30

[sbc]
type = identify
endpoint = sbc
match = ${SBC_IP}

; --- Agents (WebRTC) ---------------------------------------------------------
; Het SIP-wachtwoord komt uit AGENT_SIP_PASSWORD (env) en moet gelijk zijn aan
; Agent.SipPassword in de DB (backend: Agents:DefaultSipPassword) — beide uit infra/.env.

[agent1001]
type = endpoint
context = from-agents
disallow = all
allow = opus,alaw,ulaw
webrtc = yes
dtls_auto_generate_cert = yes
auth = agent1001
aors = agent1001

[agent1001]
type = auth
auth_type = userpass
username = agent1001
password = ${AGENT_SIP_PASSWORD}

[agent1001]
type = aor
max_contacts = 1
remove_existing = yes

[agent1002]
type = endpoint
context = from-agents
disallow = all
allow = opus,alaw,ulaw
webrtc = yes
dtls_auto_generate_cert = yes
auth = agent1002
aors = agent1002

[agent1002]
type = auth
auth_type = userpass
username = agent1002
password = ${AGENT_SIP_PASSWORD}

[agent1002]
type = aor
max_contacts = 1
remove_existing = yes
