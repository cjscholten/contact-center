; Dit is een SJABLOON: ${SBC_IP}, ${ARI_PASSWORD} en de per-agent ${AGENT1001_SIP_PASSWORD}/
; ${AGENT1002_SIP_PASSWORD} worden bij container-start ingevuld door entrypoint.sh (envsubst)
; uit infra/.env. Geen secrets/host-IP's in git.
; entrypoint.sh voegt onderaan optioneel een [acl]-sectie toe als SIP_ACL_PERMIT gezet is
; (bron-IP-allow/deny voor 5060; zet aan zodra WS via de reverse proxy loopt).

; --- Globale hardening ------------------------------------------------------
; Anonieme SIP uitsluiten: alleen op IP (trunk) of gebruikersnaam (agents) identificeren,
; geen anonymous-fallback. Er is toch geen anonymous-endpoint, dus dit weigert scanners sneller.
[global]
type = global
endpoint_identifier_order = ip,username

; --- Transports -------------------------------------------------------------

[transport-udp]
type = transport
protocol = udp
bind = 0.0.0.0:5060

; WebSocket-transport voor browser-agents (via de ingebouwde HTTP-server, /ws)
[transport-ws]
type = transport
protocol = ws
bind = 0.0.0.0

; --- Trunk: AudioCodes SBC --------------------------------------------------
; SBC_IP = IP-adres van het SBC-interface richting Asterisk (env SBC_IP).
; De SBC moet inkomende trunk-gesprekken routeren naar <asterisk-host>:5060/udp.

[sbc]
type = endpoint
transport = transport-udp
context = from-trunk
disallow = all
allow = alaw,ulaw
direct_media = no
rtp_symmetric = yes
force_rport = yes
rewrite_contact = yes
aors = sbc

[sbc]
type = aor
contact = sip:${SBC_IP}:5060
qualify_frequency = 30

[sbc]
type = identify
endpoint = sbc
match = ${SBC_IP}

; --- Agents (WebRTC) ---------------------------------------------------------
; H-4: elke agent heeft een EIGEN SIP-wachtwoord (AGENT<n>_SIP_PASSWORD, env). Eén gelekt
; wachtwoord compromitteert dan alleen die agent, niet alle agents. Elk moet gelijk zijn aan
; Agent.SipPassword in de DB (backend seedt agent1001/1002 uit dezelfde env-waarden).

[agent1001]
type = endpoint
context = from-agents
disallow = all
allow = opus,alaw,ulaw
webrtc = yes
dtls_auto_generate_cert = yes
auth = agent1001
aors = agent1001

[agent1001]
type = auth
auth_type = userpass
username = agent1001
password = ${AGENT1001_SIP_PASSWORD}

[agent1001]
type = aor
max_contacts = 1
remove_existing = yes

[agent1002]
type = endpoint
context = from-agents
disallow = all
allow = opus,alaw,ulaw
webrtc = yes
dtls_auto_generate_cert = yes
auth = agent1002
aors = agent1002

[agent1002]
type = auth
auth_type = userpass
username = agent1002
password = ${AGENT1002_SIP_PASSWORD}

[agent1002]
type = aor
max_contacts = 1
remove_existing = yes
