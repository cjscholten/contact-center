[general]
; Kleine range voor de POC; vergroot bij meer gelijktijdige gesprekken
; (2 poorten per mediastroom aanhouden) en open deze range in de firewall.
rtpstart = 10000
rtpend = 10100

; De [ice_host_candidates]-sectie wordt bij container-start door entrypoint.sh toegevoegd
; als RTP_PRIVATE_IP + RTP_PUBLIC_IP gezet zijn (1:1 NAT, bv. de Azure-VM): de mapping
; privé-IP => publiek IP zorgt dat ICE het bereikbare publieke IP aan de browser aanbiedt.
; Niet gezet (geen NAT) => sectie weggelaten, Asterisk biedt alleen het host-IP aan.
