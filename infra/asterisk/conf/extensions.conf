[general]
static = yes
writeprotect = no

; Inkomende trunk-gesprekken gaan direct naar de backend (ARI Stasis-app).
; De backend beslist: welkomsttekst, open/dicht, welke wachtrij.
[from-trunk]
exten => _[+0-9]!,1,NoOp(Inkomend gesprek van ${CALLERID(num)} naar ${EXTEN})
 same => n,Stasis(contactcenter)
 same => n,Hangup()

; De wachtrij wordt server-side door de backend bestuurd (ARI holding-/mixing-bruggen);
; er is geen app_queue-dialplan meer nodig voor wachtende bellers.

; Ad-hoc doorschakeling: de backend levert het bestemmingsnummer als extension.
; Vereist een uitgaande route op de SBC (Asterisk → Twilio-trunk).
[cc-forward]
exten => _[+0-9]!,1,NoOp(Doorschakelen naar ${EXTEN})
 same => n,Dial(PJSIP/${EXTEN}@sbc,60)
 same => n,Hangup()

; Agents bellen in de POC niet uit.
[from-agents]
exten => _[+0-9]!,1,NoOp(Uitbellen is nog niet ondersteund)
 same => n,Hangup()
