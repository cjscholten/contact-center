[general]
static = yes
writeprotect = no

; Inkomende trunk-gesprekken gaan direct naar de backend (ARI Stasis-app).
; De backend beslist: welkomsttekst, open/dicht, welke wachtrij.
[from-trunk]
exten => _[+0-9]!,1,NoOp(Inkomend gesprek van ${CALLERID(num)} naar ${EXTEN})
 same => n,Stasis(contactcenter)
 same => n,Hangup()

; De backend stuurt kanalen hierheen (ARI "continue") om in een wachtrij te landen.
; Extension-naam = wachtrijnaam.
[cc-queues]
exten => support,1,NoOp(Kanaal ${CHANNEL} naar wachtrij support)
 same => n,Queue(support)
 same => n,Hangup()

; Agents bellen in de POC niet uit.
[from-agents]
exten => _[+0-9]!,1,NoOp(Uitbellen is nog niet ondersteund)
 same => n,Hangup()
