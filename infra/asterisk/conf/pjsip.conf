; --- Transports -------------------------------------------------------------

[transport-udp]
type = transport
protocol = udp
bind = 0.0.0.0:5060

; WebSocket-transport voor browser-agents (via de ingebouwde HTTP-server, /ws)
[transport-ws]
type = transport
protocol = ws
bind = 0.0.0.0

; --- Trunk: AudioCodes SBC --------------------------------------------------
; Vervang SBC_IP door het IP-adres van het SBC-interface richting Asterisk.
; De SBC moet inkomende trunk-gesprekken routeren naar <asterisk-host>:5060/udp.

[sbc]
type = endpoint
transport = transport-udp
context = from-trunk
disallow = all
allow = alaw,ulaw
direct_media = no
rtp_symmetric = yes
force_rport = yes
rewrite_contact = yes
aors = sbc

[sbc]
type = aor
contact = sip:SBC_IP:5060
qualify_frequency = 30

[sbc]
type = identify
endpoint = sbc
match = SBC_IP

; --- Agents (WebRTC) ---------------------------------------------------------

[agent1001]
type = endpoint
context = from-agents
disallow = all
allow = opus,alaw,ulaw
webrtc = yes
dtls_auto_generate_cert = yes
auth = agent1001
aors = agent1001

[agent1001]
type = auth
auth_type = userpass
username = agent1001
password = changeme-dev

[agent1001]
type = aor
max_contacts = 1
remove_existing = yes

[agent1002]
type = endpoint
context = from-agents
disallow = all
allow = opus,alaw,ulaw
webrtc = yes
dtls_auto_generate_cert = yes
auth = agent1002
aors = agent1002

[agent1002]
type = auth
auth_type = userpass
username = agent1002
password = changeme-dev

[agent1002]
type = aor
