[modules]
autoload = yes

; chan_sip (verouderd, wordt meegeleverd door het Ubuntu-pakket) bijt
; res_pjsip: het claimt dezelfde poort 5060 en hetzelfde SIP-WebSocket-
; protocol, waardoor res_pjsip_transport_websocket weigert te laden.
noload => chan_sip.so

; Ongebruikte optionele backends: laden weigert toch (geen configuratie),
; maar zonder noload vervuilen ze de opstartlog met ERROR-regels.
noload => cdr_tds.so
noload => cel_tds.so
noload => cdr_pgsql.so
noload => cdr_sqlite3_custom.so
noload => cel_sqlite3_custom.so
noload => cdr_radius.so
noload => cel_radius.so
noload => chan_unistim.so
noload => pbx_dundi.so
noload => app_voicemail_imap.so
noload => app_voicemail_odbc.so
noload => res_hep_rtcp.so
noload => res_hep_pjsip.so
