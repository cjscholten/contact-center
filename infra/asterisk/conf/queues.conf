[general]
persistentmembers = no

; Wachtrijen zijn (nog) statisch: een nieuwe wachtrij in de database heeft ook
; een blok hier nodig. Wachtmuziek en positie-meldingen worden per wachtrij
; hier ingesteld tot de wachtrij-engine dynamisch wordt.

[support]
strategy = rrmemory
timeout = 20
retry = 2
; nawerktijd regelen we later vanuit de backend (pause/unpause), niet hier
wrapuptime = 0
musicclass = default
joinempty = yes
leavewhenempty = no
announce-position = yes
announce-frequency = 30
announce-holdtime = no
; Leden zijn dynamisch: de backend voegt agents toe/verwijdert ze bij login/logout (AMI)

[sales]
strategy = rrmemory
timeout = 20
retry = 2
wrapuptime = 0
musicclass = default
joinempty = yes
leavewhenempty = no
announce-position = yes
announce-frequency = 30
announce-holdtime = no
